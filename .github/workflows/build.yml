name: Build
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.17)'
        required: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.19'
      - name: Install Zig 0.15.2
        run: |
          brew install zig@0.15
          brew link --overwrite zig@0.15
          zig version
      - run: mix deps.get
      - run: MIX_ENV=prod mix release --overwrite
      - uses: actions/upload-artifact@v4
        with:
          name: el_macos_arm64
          path: burrito_out/el_macos_arm64
